<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of Dr. Kamatam Pavan Kalyan Reddy, Healthcare Data Analyst and Health Informatics professional.">
    <title>{% block title %}Dr. Pavan Kalyan Reddy | Healthcare Data Analyst{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='icons8-pk-file-24.png') }}">
    <style>
        :root {
            --bg: #f6f8fb;
            --surface: #ffffff;
            --surface-soft: #edf4f7;
            --text: #17202a;
            --muted: #5f6c7b;
            --line: #dce5ea;
            --primary: #0f766e;
            --primary-dark: #115e59;
            --accent: #b7791f;
            --shadow: 0 18px 45px rgba(23, 32, 42, 0.08);
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            animation: pageFade 420ms ease-out;
        }

        a {
            color: inherit;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(23, 32, 42, 0.04);
        }

        .navbar {
            max-width: 1120px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 22px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            min-width: max-content;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            letter-spacing: 0;
            transition: transform 200ms ease, background 200ms ease;
        }

        .brand:hover .brand-mark {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.15;
        }

        .brand-text strong {
            font-size: 0.98rem;
        }

        .brand-text span {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .menu {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .menu a {
            color: var(--muted);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 180ms ease, color 180ms ease, transform 180ms ease;
        }

        .menu a:hover,
        .menu a.active {
            color: var(--primary-dark);
            background: var(--surface-soft);
        }

        .menu a:hover {
            transform: translateY(-1px);
        }

        main {
            max-width: 1120px;
            margin: 0 auto;
            padding: 48px 24px 72px;
        }

        .section {
            margin-top: 56px;
        }

        .section:first-child {
            margin-top: 0;
        }

        .section-heading {
            max-width: 760px;
            margin-bottom: 24px;
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--primary-dark);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1,
        h2,
        h3,
        p {
            margin-top: 0;
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 4.4rem);
            line-height: 1.04;
            letter-spacing: 0;
            margin-bottom: 18px;
        }

        h2 {
            font-size: clamp(1.55rem, 3vw, 2.2rem);
            line-height: 1.2;
            margin-bottom: 12px;
        }

        h3 {
            font-size: 1.08rem;
            line-height: 1.35;
            margin-bottom: 8px;
        }

        .lead {
            color: var(--muted);
            font-size: 1.08rem;
            max-width: 760px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 18px;
        }

        .card {
            position: relative;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 22px;
            box-shadow: var(--shadow);
            animation: cardReveal 520ms ease-out both;
            transition: transform 260ms ease, box-shadow 260ms ease, border-color 260ms ease;
        }

        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.08), 0 0 28px rgba(15, 118, 110, 0.16);
            opacity: 0;
            transition: opacity 260ms ease;
        }

        .card:hover {
            border-color: rgba(15, 118, 110, 0.32);
            box-shadow: 0 20px 46px rgba(23, 32, 42, 0.11);
            transform: translateY(-2px);
        }

        .card:hover::after {
            animation: softCardGlow 1.6s ease-in-out infinite;
            opacity: 1;
        }

        .card p,
        .card li {
            color: var(--muted);
        }

        .card ul {
            padding-left: 20px;
            margin: 10px 0 0;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 26px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 10px 18px;
            border-radius: var(--radius);
            border: 1px solid transparent;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            transition: background 180ms ease, color 180ms ease, border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
        }

        .btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 10px 24px rgba(15, 118, 110, 0.22);
            transform: translateY(-2px);
        }

        .btn.secondary {
            background: #fff;
            color: var(--primary-dark);
            border-color: var(--line);
        }

        .btn.secondary:hover {
            background: var(--surface-soft);
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 5px 10px;
            border-radius: 999px;
            background: var(--surface-soft);
            color: var(--primary-dark);
            font-size: 0.86rem;
            font-weight: 700;
            transition: background 180ms ease, transform 180ms ease;
        }

        .tag:hover {
            background: #ddeeed;
            transform: translateY(-1px);
        }

        .meta {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        .footer-note {
            color: var(--muted);
            text-align: center;
            padding: 28px 24px 38px;
            border-top: 1px solid var(--line);
            font-size: 0.92rem;
        }

        @keyframes pageFade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes softCardGlow {
            0%,
            100% {
                opacity: 0.35;
            }

            50% {
                opacity: 1;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                scroll-behavior: auto !important;
                transition-duration: 1ms !important;
            }
        }

        @media (max-width: 760px) {
            .navbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .menu {
                justify-content: flex-start;
            }

            main {
                padding-top: 34px;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Primary navigation">
            <a class="brand" href="/">
                <span class="brand-mark">PK</span>
                <span class="brand-text">
                    <strong>Dr. Pavan Kalyan Reddy</strong>
                    <span>Healthcare Data Analyst & Informatics Specialist & Developer</span>
                </span>
            </a>
            <div class="menu">
                <a href="/" class="{% if page == 'home' %}active{% endif %}">Home</a>
                <a href="/about" class="{% if page == 'about' %}active{% endif %}">About</a>
                <a href="/projects" class="{% if page == 'projects' %}active{% endif %}">Projects</a>
                <a href="/skills" class="{% if page == 'skills' %}active{% endif %}">Skills</a>
                <a href="/contact" class="{% if page == 'contact' %}active{% endif %}">Contact</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer-note">
        Built by Dr. Kamatam Pavan Kalyan Reddy for healthcare analytics, informatics, and clinical data roles.
    </footer>
</body>
</html>
